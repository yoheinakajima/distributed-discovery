schema_version: 1
brand:
  name: Distributed Discovery
  descriptor: How groups turn evidence into portfolios of action.
  academic_bridge: Collective search under dispersed information.
  formal_object: a discovery architecture
  core_distinction: Information aggregation is not action allocation.
  public_thesis: Collective intelligence is not sufficient for collective discovery.
  hook: Better shared information can produce worse collective discovery.
  explanation: >-
    A group can improve its best guess and still waste its attempts by sending
    everyone to the same place. This project studies how evidence, roles,
    incentives, and timing shape a portfolio of search actions.
  principle: Share the evidence. Diversify the actions.
  synthesis_phrase: The Architecture of Distributed Discovery

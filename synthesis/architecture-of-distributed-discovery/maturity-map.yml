schema_version: 1
artifact_type: living-synthesis-maturity-map
evidence_labels:
  - definition
  - identity
  - analytic-theorem
  - exact-bounded-result
  - independently-reproduced-result
  - negative-result
  - conjecture
  - open-problem
  - editorial-recommendation
families:
  canonical-entry:
    maturity: canonical-entry-paper-and-exact-reproductions
    closed_gates: [atomic paradox, canonical exact planner frontier]
    open_gates: [general finite-target separation boundary]
  information-sharing-attention-recovery:
    maturity: completed-qualified-theorem-family-with-centralized-and-selection-boundaries
    closed_gates: [one-reader theorem, signal geometry, incremental sharing, General Sharing Frontier, centralized Recovery Budget, selected coordination-free positive sharing]
    open_gates: [Randomized Information Design]
    stopped_gates: [decentralized recovery at the frozen equal-sharing congestion formulation]
    primary_claims: [DD-C-0059, DD-C-0060, DD-C-0092, DD-C-0093, DD-C-0094, DD-C-0095, DD-C-0096, DD-C-0097, DD-C-0098, DD-C-0099, DD-C-0100, DD-C-0101, DD-C-0102, DD-C-0103, DD-C-0104, DD-C-0105, DD-C-0106, DD-C-0107, DD-C-0108, DD-C-0109, DD-C-0110]
    editorial_state: Incentive to Ignore remains a companion; DD-019 through DD-022 are owned by the completed Information Sharing Frontier working paper
  source-acquisition-provenance:
    maturity: general-threshold-theorem-and-bounded-provenance-counterexamples
    closed_gates: [Common-Source threshold]
    open_gates: [Price of Missing Provenance]
  reliable-discovery-action-technology:
    maturity: deterministic-threshold-theorem-and-bounded-mechanism-results
    closed_gates: [minimum-viable-team planner]
    open_gates: [reliability-aware allocation theorem]
    stopping_boundary: one registered Reliable Discovery attempt, then independent paper judgment
  discovery-implementation:
    maturity: bounded-exact-catalogues-and-potential-identities
    closed_gates: [deterministic selection catalogue]
    open_gates: [truth-obedience-budget-balance]
    stopped_gates: [decentralized recovery at the frozen equal-sharing congestion formulation]
  communication-dynamic-architecture:
    maturity: bounded-sequential-and-dynamic-results
    closed_gates: []
    open_gates: [Rate-Discovery, adaptive marginal theorem, large-team limit]
  foundational-information-comparison:
    maturity: definitions-identities-and-finite-counterexamples
    closed_gates: [information-action accounting]
    open_gates: [Discovery Order, scaling laws, general architecture theory]
rules:
  - A closed finite grid is not a closed general theorem gate.
  - Editorial maturity never upgrades epistemic claim status.
  - Negative results and counterexamples remain part of family maturity.
  - The synthesis records ownership but does not acquire theorem novelty.

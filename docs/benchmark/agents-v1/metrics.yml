schema_version: 1
status: registered-not-executed
composite_score: null
universal_ranking: false
metrics:
  - {metric_id: group-discovery, definition: indicator or probability that at least one valid action discovers the target, numerator: successful task weight, denominator: total eligible task weight, zero_convention: zero when no valid discovery action exists, units: probability, evidence_status: stochastic-agent/exact-comparator, task_compatibility: all, architecture_compatibility: all, theoretical_comparator: exact family group discovery, aggregation: paired mean by family/model/architecture, display: estimate with interval; comparator as fraction, forbidden_interpretation: human or organizational discovery}
  - {metric_id: distinct-action-coverage, definition: distinct valid targets chosen divided by available action capacity, numerator: distinct valid chosen targets, denominator: min(valid action slots and target count), zero_convention: zero when no valid action exists, units: proportion, evidence_status: stochastic-agent, task_compatibility: all action tasks, architecture_compatibility: all agents, theoretical_comparator: exact private and planner coverage, aggregation: paired mean, display: estimate with interval, forbidden_interpretation: generic creativity}
  - {metric_id: duplication, definition: valid actions beyond the first on already chosen targets divided by valid actions, numerator: valid actions minus distinct valid actions, denominator: valid actions, zero_convention: zero when no valid action exists, units: proportion, evidence_status: stochastic-agent, task_compatibility: all action tasks, architecture_compatibility: all agents, theoretical_comparator: exact comparator duplication, aggregation: paired mean, display: estimate with interval, forbidden_interpretation: wasted effort outside the declared task}
  - {metric_id: planner-regret, definition: exact planner discovery minus observed group discovery, numerator: exact planner value minus realized or estimated discovery, denominator: one, zero_convention: zero at planner equality, units: probability points, evidence_status: mixed exact/stochastic, task_compatibility: tasks with planner comparator, architecture_compatibility: all, theoretical_comparator: exact planner, aggregation: paired mean difference, display: estimate with interval, forbidden_interpretation: proof of planner implementability}
  - {metric_id: private-baseline-regret, definition: exact declared private baseline minus observed group discovery, numerator: private baseline minus discovery, denominator: one, zero_convention: zero at equality, units: probability points, evidence_status: mixed exact/stochastic, task_compatibility: all five families, architecture_compatibility: all, theoretical_comparator: exact direct-private baseline, aggregation: paired mean difference, display: estimate with interval, forbidden_interpretation: universal value of privacy}
  - {metric_id: recovery-budget-attainment, definition: indicator that valid distinct actions attain the registered recovery budget and comparator, numerator: instances attaining both budget and value, denominator: eligible instances, zero_convention: zero when recovery budget does not exist or output invalid; ineligible omitted, units: probability, evidence_status: stochastic-agent, task_compatibility: sharing/recovery/threshold, architecture_compatibility: all agents, theoretical_comparator: exact L-star, aggregation: paired proportion, display: estimate with interval, forbidden_interpretation: decentralized implementation theorem}
  - {metric_id: source-diversity, definition: one minus normalized source concentration among selected sources, numerator: one minus Herfindahl concentration, denominator: one, zero_convention: zero for no valid source choice, units: index, evidence_status: stochastic-agent, task_compatibility: acquisition, architecture_compatibility: all agents, theoretical_comparator: registered source-count profiles, aggregation: paired mean, display: estimate with interval, forbidden_interpretation: source independence}
  - {metric_id: communication-induced-action-compression, definition: isolated distinct coverage minus communicating-architecture distinct coverage on the paired instance, numerator: paired distinct-coverage difference, denominator: one, zero_convention: zero at equality, units: proportion points, evidence_status: stochastic paired contrast, task_compatibility: communication-compatible tasks, architecture_compatibility: communicating versus isolated pairs, theoretical_comparator: exact sharing compression where available, aggregation: paired mean, display: estimate with interval, forbidden_interpretation: communication is generally harmful}
  - {metric_id: distance-from-best-registered-equilibrium, definition: absolute discovery gap from the best registered equilibrium comparator, numerator: absolute value difference, denominator: one, zero_convention: zero at equality, units: probability points, evidence_status: mixed exact/stochastic, task_compatibility: equilibrium-reference tasks, architecture_compatibility: all, theoretical_comparator: best registered equilibrium, aggregation: paired mean, display: estimate with interval, forbidden_interpretation: distance from all possible equilibria}
  - {metric_id: distance-from-worst-registered-equilibrium, definition: absolute discovery gap from the worst registered equilibrium comparator, numerator: absolute value difference, denominator: one, zero_convention: zero at equality, units: probability points, evidence_status: mixed exact/stochastic, task_compatibility: equilibrium-reference tasks, architecture_compatibility: all, theoretical_comparator: worst registered equilibrium, aggregation: paired mean, display: estimate with interval, forbidden_interpretation: equilibrium selection proof}
  - {metric_id: invalid-action-rate, definition: protocol-invalid final actions divided by required final actions, numerator: invalid required actions, denominator: required final actions, zero_convention: zero when no action is required, units: proportion, evidence_status: stochastic-agent, task_compatibility: all, architecture_compatibility: all agents, theoretical_comparator: zero, aggregation: paired proportion, display: estimate with interval, forbidden_interpretation: provider reliability generally}
  - {metric_id: protocol-compliance, definition: indicator all information/message/tool/action rules were satisfied, numerator: compliant instances, denominator: executed instances, zero_convention: zero on missing trace or unverifiable rights, units: probability, evidence_status: stochastic-agent, task_compatibility: all, architecture_compatibility: all agents, theoretical_comparator: one, aggregation: paired proportion, display: estimate with interval, forbidden_interpretation: safety certification}
  - {metric_id: calls, definition: provider or local model invocations, numerator: calls, denominator: one, zero_convention: zero for exact comparator, units: calls, evidence_status: operational, task_compatibility: all, architecture_compatibility: agents only, theoretical_comparator: none, aggregation: sum, display: integer, forbidden_interpretation: scientific quality}
  - {metric_id: tokens, definition: documented input plus output token usage where available, numerator: tokens, denominator: one, zero_convention: missing when provider does not report, units: tokens, evidence_status: operational, task_compatibility: all, architecture_compatibility: agents only, theoretical_comparator: none, aggregation: sum and quantiles, display: integer, forbidden_interpretation: cross-provider compute equivalence}
  - {metric_id: cost, definition: dated billed or estimated execution cost, numerator: currency cost, denominator: one, zero_convention: zero only when no cost incurred, units: USD observation, evidence_status: operational, task_compatibility: all, architecture_compatibility: agents only, theoretical_comparator: none, aggregation: sum, display: dated amount, forbidden_interpretation: social welfare or model quality}

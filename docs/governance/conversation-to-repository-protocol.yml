schema_version: 1
authority: owner-governance
chat_role: intake-not-program-memory
raw_transcript_storage_default: false
private_chat_links_allowed: false
capture_classifications:
  - capture-now
  - queue-after-active-pr
  - evidence-dependent
  - already-canonical
  - superseded
  - do-not-canonicalize
durable_statuses:
  - captured-unreviewed
  - candidate
  - owner-adopted
  - routed
  - evidence-dependent
  - deferred
  - rejected
  - superseded
  - implemented
  - closed-by-overlap
  - closed-by-null
requirements:
  owner_adopted_requires_canonical_destination: true
  superseded_requires_replacement: true
  evidence_dependent_requires_trigger: true
  scientific_proposition_requires_existing_authority_link: true
  issue_closeout_delta_audit: true
  substantive_execplan_delta_audit: true
registry_role: router-not-scientific-source
canonical_destinations:
  - policy
  - decision-record
  - ADR
  - ExecPlan
  - roadmap
  - lifecycle-registry
  - release-record
  - claim-or-study-link
visibility:
  - public
  - internal
  - restricted-reference-only
prohibited:
  - raw-chat-transcript
  - private-chat-url
  - credential
  - secret
  - unclassified-owner-decision
  - scientific-status-promotion
  - fabricated-external-state

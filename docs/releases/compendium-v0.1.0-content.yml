schema_version: 1
compendium_version: 0.1.0
candidate_tag: dd-compendium-v0.1.0
tracked_files_only: true
groups:
  - group_id: repository-source
    include: true
    paths: ["Git tree at explicit source revision"]
    authority: future annotated tag
    license: MIT
    checksum_rule: immutable Git object identity
    required: true
    privacy: public
    reason: Exact software, methods, schemas, and reproducibility source.
    external_owner_attestation_required: false
    archive_destination: github-tag-source-archive
  - group_id: seven-local-papers
    include: true
    paths: ["papers/foundations", "papers/three-results", "papers/discovery-institutions", "papers/common-source-trap", "papers/incentive-to-ignore", "papers/threshold-discovery", "papers/information-sharing-frontier"]
    authority: paper lifecycle, metadata, and validation records
    license: pending owner release attestation under current license matrix
    checksum_rule: SHA-256 per member and exact PDF invariant
    required: true
    privacy: public
    reason: Seven project-authored paper artifacts and declared reproduction source.
    external_owner_attestation_required: true
    archive_destination: papers/
  - group_id: scientific-ledger
    include: true
    paths: ["claims/claims.yml", "studies/index.md", "results/**/manifest.json", "results/verified/**"]
    authority: Git scientific ledger
    license: MIT
    checksum_rule: Git object identity and release manifest inventory
    required: true
    privacy: public
    reason: Claim, study, run, and verified-result provenance.
    external_owner_attestation_required: false
    archive_destination: github-tag-source-archive
  - group_id: schemas-methods-and-validators
    include: true
    paths: ["claims/schema.json", "docs/**", "scripts/**", "src/**", "tests/**"]
    authority: repository contract and reproducibility policy
    license: MIT
    checksum_rule: Git object identity
    required: true
    privacy: public
    reason: Validation, methods, governance, and reproducibility infrastructure.
    external_owner_attestation_required: false
    archive_destination: github-tag-source-archive
  - group_id: treasurebench-public-infrastructure
    include: true
    paths: ["src/distributed_discovery/benchmark/**", "site/src/**", "docs/benchmarks/**"]
    authority: TreasureBench naming registry and public site registries
    license: MIT
    checksum_rule: Git object identity
    required: true
    privacy: public
    reason: Public TreasureBench and Treasure Hunt infrastructure without sealed material.
    external_owner_attestation_required: false
    archive_destination: github-tag-source-archive
  - group_id: upstream-integration
    include: true
    paths: ["upstream/upstream.lock.yml", "papers/upstream-extension/**"]
    authority: pinned upstream lock and additive integration metadata
    license: attribution and repository records only
    checksum_rule: pinned commit and PDF SHA-256
    required: true
    privacy: public
    reason: Preserve attribution and integration provenance without duplicating the upstream paper.
    external_owner_attestation_required: false
    archive_destination: github-tag-source-archive
  - group_id: local-and-private-material
    include: false
    paths: [".env.txt", "local release authorization", "private benchmark material", "untracked files", "site/dist", ".git", "local virtual environments", "caches", "unlicensed third-party assets", "duplicate upstream paper bundle"]
    authority: release exclusion policy
    license: null
    checksum_rule: reject if encountered
    required: true
    privacy: excluded-private
    reason: Credentials, authorization, private evidence, local output, and undeclared content cannot enter a public release.
    external_owner_attestation_required: false
    archive_destination: null

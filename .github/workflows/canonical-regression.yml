name: Canonical baseline regression
on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 1 * *"
jobs:
  reproduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
      - run: uv python install 3.12
      - run: make bootstrap
      - run: make reproduce-baseline

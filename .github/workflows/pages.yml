name: Deploy companion site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Prevent overlapping deployments. A newer deployment supersedes an older one.
concurrency:
  group: github-pages
  cancel-in-progress: true

# The build job needs repository read access.
permissions:
  contents: read

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Bootstrap repository
        run: make bootstrap

      - name: Verify repository
        run: make verify

      - name: Build companion site
        run: make site

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/dist

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4

name: CI
on:
  push:
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with: {enable-cache: true}
      - run: uv python install 3.12
      - run: make bootstrap
      - name: Lint
        run: make lint
      - name: Typecheck
        run: make typecheck
      - name: Integration and regression tests
        run: uv run --no-editable pytest tests/integration tests/regression
      - name: Unit tests
        run: uv run --no-editable pytest tests/unit
      - name: Validate claims and run manifests
        run: make validate-claims

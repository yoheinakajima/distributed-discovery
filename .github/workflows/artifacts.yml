name: Paper and site builds
on:
  pull_request:
    paths: ["papers/**", "site/**", "claims/**", "scripts/build_*", ".github/workflows/artifacts.yml"]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
      - run: uv python install 3.12
      - run: make bootstrap
      - uses: wtfjoke/setup-tectonic@v4
        with:
          tectonic-version: 0.16.9
      - name: Install PDF inspection tools
        run: sudo apt-get update && sudo apt-get install --yes poppler-utils
      - run: make papers
      - run: make site

name: Research question
description: Register a scoped research question
title: "research: "
labels: ["type:research"]
body:
  - type: input
    id: study
    attributes: {label: Study ID}
    validations: {required: true}
  - type: textarea
    id: question
    attributes: {label: Precise question}
    validations: {required: true}
  - type: textarea
    id: evidence
    attributes: {label: Existing evidence and dependencies}
  - type: textarea
    id: falsification
    attributes: {label: Falsifiable outcome or completion criterion}
    validations: {required: true}

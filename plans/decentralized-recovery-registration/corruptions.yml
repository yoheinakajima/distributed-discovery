schema_version: 1
corruptions:
  - {id: DR-COR-01, object: posterior-normalization, mutation: "add 1/100 to one mass without renormalizing", expected_invariant: posterior-sums-to-one, verifier: primitive-posterior-reconstructor, error_class: normalization-error, scientific_meaning: prevents invalid beliefs from entering payoff and discovery calculations}
  - {id: DR-COR-02, object: target-permutation, mutation: "swap posterior labels without swapping channel/action labels", expected_invariant: permutation-equivariance, verifier: cross-method-permutation-audit, error_class: symmetry-error, scientific_meaning: detects label-dependent recovery classifications}
  - {id: DR-COR-03, object: equal-split-payoff, mutation: "replace collision payoff mu_j/2 by mu_j", expected_invariant: payoff-budget, verifier: primitive-payoff-enumerator, error_class: payoff-error, scientific_meaning: distinguishes congestion sharing from duplicate full credit}
  - {id: DR-COR-04, object: unilateral-deviation, mutation: "evaluate a move to k at mu_k/2 rather than mu_k when k is empty", expected_invariant: direct-deviation-reconstruction, verifier: primitive-action-deviation-enumerator, error_class: deviation-error, scientific_meaning: challenges Nash completeness at the recovery boundary}
  - {id: DR-COR-05, object: nash-label, mutation: "flip one collision profile from Nash to non-Nash", expected_invariant: complete-best-response-equivalence, verifier: symbolic-versus-primitive-correspondence, error_class: equilibrium-label-error, scientific_meaning: tests full simultaneous correspondence}
  - {id: DR-COR-06, object: continuation-response, mutation: "select a strictly inferior second action after one first action", expected_invariant: nodewise-best-response, verifier: primitive-backward-induction, error_class: continuation-error, scientific_meaning: tests every sequential subgame rather than the path alone}
  - {id: DR-COR-07, object: spe-label, mutation: "mark a profile SPE despite one off-path continuation failure", expected_invariant: subgame-perfection, verifier: full-contingent-strategy-audit, error_class: spe-label-error, scientific_meaning: distinguishes Nash of the path from SPE}
  - {id: DR-COR-08, object: tie-boundary, mutation: "classify b=a/2 as strict recovery", expected_invariant: weak-inequality-correspondence, verifier: exact-rational-boundary-regression, error_class: boundary-error, scientific_meaning: preserves indifferent collision outcomes}
  - {id: DR-COR-09, object: centralized-v2, mutation: "drop the second posterior mass", expected_invariant: top-two-reconstruction, verifier: primitive-comparator-enumerator, error_class: centralized-comparator-error, scientific_meaning: prevents consensus from masquerading as top-two authority}
  - {id: DR-COR-10, object: private-p2, mutation: "force tied direct actions to share one random draw", expected_invariant: independent-private-tie-reconstruction, verifier: primitive-private-baseline-enumerator, error_class: private-comparator-error, scientific_meaning: preserves the declared DD-021 baseline}
  - {id: DR-COR-11, object: best-worst, mutation: "exchange best and worst discovery at equality", expected_invariant: order-and-membership-aggregation, verifier: equilibrium-outcome-aggregator, error_class: aggregation-error, scientific_meaning: tests multiplicity and recovery spread}
  - {id: DR-COR-12, object: recovery-classification, mutation: "label top collision as top-two recovery", expected_invariant: covered-set-in-top-two-correspondence, verifier: independent-set-comparator, error_class: recovery-label-error, scientific_meaning: distinguishes target coverage from payoff or equilibrium existence}

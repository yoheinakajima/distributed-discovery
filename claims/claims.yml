    statement: In DD-012's 175-cell rational census, equal-split attention has 63 excessive-attention cells, three equilibrium-multiplicity cells with a welfare difference, and 24 cells where all-attend is an equilibrium although one reader is uniquely optimal; sole-rescue, marginal-coverage, universal-pooling, and a binding public-reader license exactly match the social-optimum correspondence in all 175 cells, while off-shared-success yields unique all-ignore in all cells and the assigned-reader subsidy has no socially optimal weak equilibrium in any cell.

  - id: DD-C-0071
    study_id: DD-016
    short_name: minimum-viable-team-planner-theorem
    statement: In the frozen atomic threshold-opening model, a deterministic planner's optimal discovery value is the sum of the largest min(floor(N/tau),M) posterior masses, and an optimum exists that assigns exactly tau agents to each selected candidate before placing leftovers.
    scope: Any finite M, positive N, threshold tau in {1,...,N}, one hidden atomic target, one action per agent, deterministic execution, zero value above threshold, no replication value, and a normalized posterior; this is an existence and value theorem, not uniqueness, strategic implementation, or an equilibrium statement.
    claim_type: theorem
    status: verified
    source_type: human-readable-capacity-proof-with-exhaustive-small-allocation-audit
    source_reference: results/verified/20260722T021526Z_DD-016_00271ff8_123b2809e3/outputs/planner-audit.json
    proof_path: studies/DD-016-threshold-discovery/proof.md
    implementation_paths: [src/distributed_discovery/threshold_discovery/model.py, src/distributed_discovery/threshold_discovery/verification.py]
    run_ids: [20260722T021526Z_DD-016_00271ff8_123b2809e3]
    test_paths: [tests/unit/test_threshold_discovery.py]
    exactness_basis: The proof bounds the number of opened candidates by floor(N/tau), applies posterior ranking, and constructs a minimum-team allocation attaining the bound; 63 exact exhaustive small-allocation checks cover three posterior fixtures, N=1 through 6, and every admissible threshold.
    rounding_rule: exact fractions; no decimal approximation is authoritative
    dependencies: []
    contradicts: []
    supersedes: []
    first_added: "2026-07-22"
    last_checked: "2026-07-22"
    notes: The min with M is necessary when team capacity exceeds the candidate count. Posterior ties and leftover placement can create multiple optima.
  - id: DD-C-0072
    study_id: DD-016
    short_name: threshold-split-prize-payoff-identities
    statement: If every other agent independently selects candidate j with probability x_j, equal splitting gives payoff V*pi_j*E[1{K_j>=tau-1}/(K_j+1)]; at tau=1 its share factor is [1-(1-x_j)^N]/(N*x_j) with zero limit one, and at tau=2 it subtracts (1-x_j)^(N-1) and has zero limit zero.
    scope: The frozen one-candidate deviation calculation with N finite, K_j binomial(N-1,x_j), threshold opening, equal splitting among agents at the successful target, and fixed posterior pi_j; this does not characterize an equilibrium correspondence or select an equilibrium.
    claim_type: identity
    status: verified
    source_type: finite-binomial-sum-derivation-with-exact-closed-form-audit
    source_reference: results/verified/20260722T021526Z_DD-016_00271ff8_123b2809e3/outputs/strategic-payoff-audit.json
    proof_path: studies/DD-016-threshold-discovery/proof.md
    implementation_paths: [src/distributed_discovery/threshold_discovery/model.py, src/distributed_discovery/threshold_discovery/verification.py]
    run_ids: [20260722T021526Z_DD-016_00271ff8_123b2809e3]
    test_paths: [tests/unit/test_threshold_discovery.py]
    exactness_basis: The binomial-coefficient identity converts the finite tau=1 sum to its closed form and tau=2 removes exactly the k=0 term; 35 exact rational audit rows compare direct sums and closed forms for N=2 through 8 and five probabilities, including zero and one.
    rounding_rule: exact fractions; continuous endpoint limits are evaluated exactly
    dependencies: []
    contradicts: []
    supersedes: []
    first_added: "2026-07-22"
    last_checked: "2026-07-22"
    notes: This is a payoff identity conditional on independent opponent choice probabilities, not evidence that agents actually use such a mixture.

    statement: With full public access and ex-ante choice between the registered follow-shared and follow-private modes, universal pooling—each role receives 1/N exactly when the team discovers—implements the binding-optimal reader-count correspondence for every finite N at least 2 and interior p,q, is strict when p differs from q, is ex-post budget balanced against the unit discovery prize, and needs no external subsidy.
